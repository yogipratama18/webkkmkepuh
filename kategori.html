<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Kategori — KKM Warta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="site-header"></div>

<main class="wrap">
  <div class="breadcrumb">
    <a href="index.html">Beranda</a><span class="sep">/</span><span class="current" id="crumb-label">Kategori</span>
  </div>

  <div class="page-hero">
    <div class="kicker">Rubrik</div>
    <h1 id="cat-heading">Kategori</h1>
    <p id="cat-desc">Kumpulan berita dalam kategori ini.</p>
  </div>

  <div class="chip-row" id="chip-row"></div>

  <section class="section" style="padding-top:8px;">
    <div class="card-grid" id="cat-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <h3>Belum Ada Berita</h3>
      <p>Kategori ini belum memiliki artikel. Coba lihat rubrik lain ya.</p>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('kategori') || CATEGORIES[0].slug;
  const label = categoryLabel(slug);

  document.getElementById('page-title').textContent = `${label} — KKM Warta`;
  document.getElementById('crumb-label').textContent = label;
  document.getElementById('cat-heading').textContent = label;
  document.getElementById('cat-desc').textContent = `Kumpulan liputan KKM Kelompok 15 seputar ${label.toLowerCase()} di Kelurahan Kepuh.`;

  document.getElementById('chip-row').innerHTML = CATEGORIES.map(c =>
    `<a class="chip${c.slug === slug ? ' active' : ''}" href="kategori.html?kategori=${c.slug}">${c.label}</a>`
  ).join('');

  const items = getArticlesByCategory(slug);
  if(items.length){
    document.getElementById('cat-grid').innerHTML = items.map(cardHtml).join('');
  } else {
    document.getElementById('cat-grid').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
  }

  initSite('kategori', slug);
</script>
</body>
</html>
